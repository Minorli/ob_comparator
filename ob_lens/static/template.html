<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ob-lens — OceanBase 迁移校验报告</title>
<style>
/* STYLE_PLACEHOLDER */
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <span class="nav-brand">ob-lens</span>
    <button class="nav-tab active" data-page="dashboard">仪表盘</button>
    <button class="nav-tab" data-page="problems">问题对象</button>
    <button class="nav-tab" data-page="history">历史运行</button>
    <span class="nav-right" id="nav-version"></span>
  </div>
</nav>

<!-- Page: Dashboard -->
<div id="page-dashboard" class="page active">
  <div class="container">

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px">
        <span style="font-size:18px;font-weight:700">最近一次运行</span>
        <span id="dash-ts" style="font-size:14px;color:var(--text-secondary)"></span>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card success">
        <div class="stat-value" id="dash-consistent">—</div>
        <div class="stat-label">✓ 一致</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-value" id="dash-missing">—</div>
        <div class="stat-label">✗ 缺失</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-value" id="dash-incompatible">—</div>
        <div class="stat-label">⚡ 不兼容 / 阻断</div>
      </div>
      <div class="stat-card info">
        <div class="stat-value" id="dash-extra">—</div>
        <div class="stat-label">＋ 多余</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">修补进度</div>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span>可自动修补</span>
          <span id="progress-text">—</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="document.querySelector('[data-page=problems]').click()">查看所有问题</button>
        <button class="btn btn-secondary" onclick="document.querySelector('[data-page=history]').click()">历史运行</button>
      </div>
    </div>

  </div>
</div>

<!-- Page: Problem Browser -->
<div id="page-problems" class="page">
  <div class="container">
    <div class="card" style="margin-bottom:16px">
      <div class="filter-bar">
        <input id="search-input" class="search-input" type="search" placeholder="搜索对象名、Schema、原因…">
        <select id="filter-state" class="filter-select">
          <option value="all">全部状态</option>
          <option value="SUPPORTED">缺失可修补</option>
          <option value="UNSUPPORTED">不兼容</option>
          <option value="BLOCKED">阻断</option>
        </select>
        <select id="filter-type" class="filter-select">
          <option value="all">全部类型</option>
        </select>
        <select id="filter-schema" class="filter-select">
          <option value="all">全部 Schema</option>
        </select>
        <span class="filter-count" id="filter-count"></span>
      </div>
    </div>
    <div id="object-list" class="object-list"></div>
  </div>
</div>

<!-- Page: History -->
<div id="page-history" class="page">
  <div class="container">
    <div class="card">
      <div class="card-title">历史运行记录</div>
      <table class="run-table">
        <thead>
          <tr>
            <th>运行时间</th>
            <th>状态</th>
            <th>一致</th>
            <th>缺失</th>
            <th>不兼容/阻断</th>
            <th>多余</th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
window.__OB_LENS_DATA__ = /* DATA_PLACEHOLDER */;
</script>
<script>
/* SCRIPT_PLACEHOLDER */
</script>
</body>
</html>
